name: Test Screen Reader

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-screenreader:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-15, macos-26, windows-2022, windows-2025]
        browser: [chromium]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
      - run: npx -y --min-release-age=0 @guidepup/setup@0.24.1 setup --ci --macos-record
      - run: yarn install --frozen-lockfile
      - run: yarn pretest
      - run: npx -y --min-release-age=0 @guidepup/setup@0.24.1 install
      - run: yarn test:screenreader:${{ matrix.browser }}
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: artifacts-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            **/test-results/**/*
            **/recordings/**/*
